<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="referrer" content="no-referrer">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>对不起 💌</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
  min-height:100vh;min-height:100dvh;
  background:linear-gradient(135deg,#fce4ec 0%,#f8bbd0 30%,#fff3e0 70%,#ffe0b2 100%);
  display:flex;align-items:center;justify-content:center;
  overflow-x:hidden;-webkit-tap-highlight-color:transparent;
  user-select:none;-webkit-user-select:none;
}
#particlesCanvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.container{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;width:100%;max-width:360px;padding:20px}

/* Envelope */
.envelope-wrapper{position:relative;width:280px;height:200px;cursor:pointer;perspective:600px;transition:transform .3s}
.envelope-wrapper:active{transform:scale(.97)}
.envelope-body{position:absolute;bottom:0;width:100%;height:155px;background:linear-gradient(180deg,#f8a5b5,#e5738c);border-radius:0 0 12px 12px;box-shadow:0 8px 30px rgba(180,60,90,.3)}
.seal{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);width:36px;height:36px;z-index:5;font-size:28px;display:flex;align-items:center;justify-content:center;transition:transform .5s,opacity .5s}
.seal.hidden{transform:translateX(-50%) scale(0);opacity:0}
.envelope-flap{position:absolute;top:-2px;left:0;width:100%;height:120px;background:linear-gradient(180deg,#f48fb1,#ec7a93);clip-path:polygon(0 0,50% 100%,100% 0);border-radius:12px 12px 0 0;transform-origin:top center;transition:transform .8s cubic-bezier(.4,0,.2,1);z-index:4;backface-visibility:hidden;box-shadow:0 4px 15px rgba(180,60,90,.25)}
.envelope-flap.open{transform:rotateX(-180deg)}
.envelope-letter-hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:90%;height:80%;background:#fffef9;border-radius:4px;z-index:2;display:flex;align-items:center;justify-content:center;flex-direction:column;opacity:.3;box-shadow:inset 0 0 20px rgba(0,0,0,.03)}
.envelope-letter-hint .line{width:60%;height:3px;background:#e0d5d5;border-radius:2px;margin:5px 0}
.envelope-tap-hint{position:absolute;bottom:-45px;width:100%;text-align:center;color:#b06a7a;font-size:14px;letter-spacing:1px;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.6;transform:translateY(0)}50%{opacity:1;transform:translateY(-4px)}}

/* Letter */
.letter-paper{display:none;width:100%;max-width:320px;background:#fffef9;border-radius:12px;padding:28px 24px;box-shadow:0 10px 40px rgba(140,50,70,.15);position:relative;transform:translateY(20px);opacity:0;transition:all .6s cubic-bezier(.4,0,.2,1);margin-top:-20px;min-height:240px}
.letter-paper.visible{transform:translateY(0);opacity:1}
.letter-paper::before{content:'';position:absolute;top:0;left:18px;width:1px;height:100%;background:repeating-linear-gradient(to bottom,transparent,transparent 26px,#f0e0e0 26px,#f0e0e0 27px);opacity:.5}
.letter-title{font-size:20px;color:#c94f6a;text-align:center;margin-bottom:16px;font-weight:600}
.letter-text{font-size:15px;color:#5a3a3a;line-height:1.9;min-height:140px;white-space:pre-line}
.typewriter-cursor{display:inline-block;width:2px;height:18px;background:#c94f6a;margin-left:1px;vertical-align:text-bottom;animation:blink .7s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* In-letter choices */
.letter-choices{display:none;flex-direction:column;gap:10px;margin-top:18px;align-items:center}
.letter-choices.visible{display:flex;animation:fadeSlideUp .4s ease forwards}
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.choice-btn{padding:11px 28px;border-radius:50px;font-size:14px;font-weight:600;letter-spacing:1px;cursor:pointer;border:none;transition:all .2s;width:85%}
.choice-btn:active{transform:scale(.96)}
.choice-yes{background:linear-gradient(135deg,#f06292,#e57373);color:#fff;box-shadow:0 4px 14px rgba(230,80,110,.3)}
.choice-no{background:transparent;color:#c48a95;border:1.5px solid #e0b4be}

/* Bottom buttons */
.btn-row{display:none;flex-direction:column;align-items:center;gap:12px;margin-top:28px;width:100%;max-width:320px}
.btn-row.visible{display:flex;animation:fadeSlideUp .5s ease forwards}
.btn-forgive{padding:15px 52px;background:linear-gradient(135deg,#f06292,#e57373);color:#fff;border:none;border-radius:50px;font-size:17px;font-weight:600;letter-spacing:2px;cursor:pointer;box-shadow:0 6px 24px rgba(230,80,110,.35);transition:all .25s;width:100%}
.btn-forgive:active{transform:scale(.96);box-shadow:0 3px 12px rgba(230,80,110,.5)}
.btn-no{padding:12px 40px;background:transparent;color:#c48a95;border:1.5px solid #e0b4be;border-radius:50px;font-size:14px;font-weight:500;letter-spacing:1px;cursor:pointer;transition:all .25s;width:70%}
.btn-no:active{background:rgba(200,140,160,.1);border-color:#c48a95}
.thank-you{display:none;font-size:22px;color:#c94f6a;text-align:center;margin-top:24px;font-weight:600;animation:fadeInScale .8s ease forwards}
@keyframes fadeInScale{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}

/* Achievement card */
.achievement-card{display:none;margin-top:20px;background:#fffef9;border-radius:16px;padding:20px 24px;text-align:center;box-shadow:0 4px 24px rgba(140,50,70,.12);animation:fadeInScale .6s ease forwards;max-width:280px;width:100%}
.achievement-title{font-size:16px;font-weight:700;color:#c94f6a;margin-bottom:8px}
.achievement-badge{font-size:30px;padding:6px 0 10px;letter-spacing:6px}
.achievement-name{font-size:15px;color:#5a3a3a;font-weight:600;margin-top:2px}
.achievement-hint{font-size:13px;color:#b38a90;margin-top:10px;letter-spacing:1px}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(60,20,30,.45);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .3s}
.overlay.active{opacity:1;pointer-events:auto}
.modal-card{background:#fffef9;border-radius:18px;padding:30px 24px 24px;max-width:300px;width:100%;text-align:center;box-shadow:0 16px 48px rgba(80,20,40,.25);transform:scale(.85);transition:transform .35s cubic-bezier(.34,1.56,.64,1)}
.overlay.active .modal-card{transform:scale(1)}
.modal-emoji{font-size:52px;margin-bottom:12px;animation:bounceIn .6s ease}
@keyframes bounceIn{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
.modal-title{font-size:19px;color:#5a3a3a;font-weight:600;margin-bottom:8px}
.modal-subtitle{font-size:14px;color:#b38a90;margin-bottom:18px;line-height:1.8;white-space:normal}
.modal-buttons{display:flex;flex-direction:column;gap:10px;align-items:center}
.modal-btn-primary{padding:14px 40px;background:linear-gradient(135deg,#f06292,#e57373);color:#fff;border:none;border-radius:50px;font-size:16px;font-weight:600;letter-spacing:1px;cursor:pointer;box-shadow:0 4px 16px rgba(230,80,110,.3);width:100%;transition:transform .2s}
.modal-btn-primary:active{transform:scale(.95)}
.modal-btn-secondary{padding:12px 32px;background:transparent;color:#b38a90;border:1.5px solid #e0c8cd;border-radius:50px;font-size:14px;font-weight:500;cursor:pointer;width:70%;transition:all .2s}
.modal-btn-secondary:active{background:rgba(200,140,160,.08)}

/* Apology action list */
.apology-list{text-align:left;margin:8px 0 4px}
.apology-item{padding:9px 4px;font-size:14px;color:#5a3a3a;border-bottom:1px dashed #f0e0e0;line-height:1.6}
.apology-item:last-child{border-bottom:none}

/* Burst hearts */
.burst-heart{position:fixed;font-size:24px;pointer-events:none;z-index:200;animation:burstFly 2s ease-out forwards}
@keyframes burstFly{0%{opacity:1;transform:translate(0,0) scale(.5) rotate(0deg)}60%{opacity:1}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(1.2) rotate(var(--rot))}}

/* Hidden path viewer */
.path-trigger{position:fixed;bottom:6px;right:14px;font-size:11px;color:rgba(180,120,140,.18);cursor:pointer;z-index:50;padding:12px 10px;-webkit-tap-highlight-color:transparent;user-select:none}
.path-panel{position:fixed;bottom:-300px;left:50%;transform:translateX(-50%);background:#fffef9;border-radius:14px;padding:20px 24px;box-shadow:0 -4px 28px rgba(80,20,40,.18);z-index:300;max-width:280px;width:88%;transition:bottom .4s cubic-bezier(.34,1.56,.64,1);text-align:center}
.path-panel.visible{bottom:24px}
.path-title{font-size:15px;font-weight:600;color:#c94f6a;margin-bottom:12px}
.path-rows{font-size:14px;color:#5a3a3a;line-height:2.2}
.path-close{margin-top:14px;padding:7px 24px;background:transparent;border:1px solid #e0c8cd;border-radius:50px;color:#b38a90;font-size:13px;cursor:pointer}
.music-toggle{position:fixed;top:20px;right:20px;z-index:100;width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.7);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(210,150,160,.35);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .35s;box-shadow:0 2px 12px rgba(0,0,0,.06);line-height:1;padding:0;outline:none}
.music-toggle:active{transform:scale(.88)}
.music-toggle.muted{opacity:.45;background:rgba(255,255,255,.5)}
.pbar{width:100%;height:3px;background:rgba(200,150,160,.2);border-radius:2px;cursor:pointer;position:relative;margin:6px 0 2px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,#f06292,#e57373);border-radius:2px;width:0%}
.ptime{display:flex;justify-content:space-between;font-size:9px;color:#b38a90;margin-bottom:4px}
.crow{display:flex;align-items:center;gap:5px;margin-top:2px}
.vi{font-size:11px;color:#b38a90;width:14px;text-align:center}
.vs{-webkit-appearance:none;appearance:none;flex:1;height:3px;background:rgba(200,150,160,.2);border-radius:2px;outline:none;cursor:pointer}
.vs::-webkit-slider-thumb{-webkit-appearance:none;width:9px;height:9px;border-radius:50%;background:#f06292;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.1);cursor:pointer}
.cbtn{background:none;border:none;font-size:15px;cursor:pointer;padding:0;line-height:1;color:#c94f6a;width:18px;text-align:center;transition:transform .2s}
.cbtn:active{transform:scale(.82)}
/* 🎵 Bottom music bar */
body{padding-bottom:64px}
.bar{position:fixed;bottom:0;left:0;right:0;z-index:1000;height:56px;background:rgba(255,255,255,.85);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid rgba(210,150,160,.18);display:none;align-items:center;padding:0 12px;gap:8px;box-shadow:0 -2px 12px rgba(0,0,0,.04)}
.bar.show{display:flex}
.bar-left{display:flex;align-items:center;gap:10px;min-width:0;flex-shrink:0}
.bar-cover{width:40px;height:40px;border-radius:6px;overflow:hidden;flex-shrink:0;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.bar-cover img{width:100%;height:100%;object-fit:cover;display:block}
.bar-info{min-width:0;cursor:pointer}
.bar-title{font-size:13px;font-weight:600;color:#4a2a30;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90px;line-height:1.3}
.bar-artist{font-size:10px;color:#b38a90;line-height:1.2;white-space:nowrap}
.bar-center{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;min-width:0;padding:0 4px}
.bar-ctrl{display:flex;align-items:center;gap:6px}
.bar-btn{background:none;border:none;font-size:16px;cursor:pointer;padding:0;line-height:1;color:#7a5a60;transition:transform .15s;display:flex;align-items:center;justify-content:center;width:24px;height:24px}
.bar-btn:active{transform:scale(.82)}
.bar-play{font-size:22px;color:#c94f6a;width:28px;height:28px}
.bar-mode{font-size:13px;color:#b38a90;width:20px}
.bar-mode.active{color:#c94f6a}
.bar-progress{display:flex;align-items:center;gap:6px;width:100%;max-width:340px}
.bar-time{font-size:10px;color:#b38a90;white-space:nowrap;min-width:28px;text-align:center;font-variant-numeric:tabular-nums}
.bar-track{flex:1;height:3px;background:rgba(200,160,170,.2);border-radius:2px;cursor:pointer;position:relative;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,#f06292,#e57373);border-radius:2px;width:0%;transition:width .15s linear}
.bar-right{display:flex;align-items:center;gap:4px;flex-shrink:0}
.bar-sbtn{background:none;border:none;font-size:15px;cursor:pointer;padding:0;line-height:1;color:#b38a90;width:22px;height:22px;display:flex;align-items:center;justify-content:center;transition:color .2s}
.bar-sbtn:active{transform:scale(.82)}
.bar-vol{display:flex;align-items:center;gap:3px}
.bar-vi{font-size:11px;color:#b38a90;width:14px;text-align:center;line-height:1}
.bar-vs{-webkit-appearance:none;appearance:none;width:50px;height:3px;background:rgba(200,160,170,.2);border-radius:2px;outline:none;cursor:pointer}
.bar-vs::-webkit-slider-thumb{-webkit-appearance:none;width:8px;height:8px;border-radius:50%;background:#f06292;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.1);cursor:pointer}
/* Lyrics overlay */
.lyric-overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:2000;background:rgba(20,10,12,.75);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);display:none;align-items:center;justify-content:center;flex-direction:column;color:#fff;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif}
.lyric-overlay.show{display:flex}
.lyric-bg{position:absolute;top:0;left:0;width:100%;height:100%;background-size:cover;background-position:center;opacity:.12;z-index:-1}
.lyric-close{position:absolute;top:16px;right:20px;font-size:22px;cursor:pointer;opacity:.5;transition:opacity .2s;background:none;border:none;color:#fff;padding:8px;line-height:1}
.lyric-close:hover{opacity:1}
.lyric-body{text-align:center;padding:40px 30px;max-width:400px}
.lyric-title{font-size:28px;font-weight:700;margin-bottom:2px;letter-spacing:2px}
.lyric-artist{font-size:16px;opacity:.6;margin-bottom:40px;font-weight:400}
.lyric-line{font-size:20px;line-height:1.8;opacity:.4;transition:opacity .4s;margin:6px 0}
.lyric-line.active{opacity:1;font-size:22px;font-weight:500}
</style>
</head>
<body>
<button class="music-toggle muted" id="musicToggle" title="点击开启音乐">🎵</button>
<audio id="bgMusic" loop preload="auto"></audio>
<div class="bar" id="bar">
  <div class="bar-left">
    <div class="bar-cover" id="barCover"><img src="./music/balalaika.jpg" alt="cover" id="coverImg"></div>
    <div class="bar-info" id="barInfo">

  <div class="bar-center">
    <div class="bar-ctrl">
      <button class="bar-btn" id="prevBtn">⏮</button>
      <button class="bar-btn bar-play" id="playBtn">▶</button>

      <button class="bar-btn bar-mode" id="modeBtn">🔁</button>

<div class="lyric-overlay" id="lyricOverlay">

</div>
<canvas id="particlesCanvas"></canvas>

<div class="container">

  <div class="envelope-wrapper" id="envelopeWrapper">
    <div class="envelope-body"></div>
    <div class="envelope-letter-hint">
      <div class="line"></div>
      <div class="line" style="width:45%"></div>
      <div class="line" style="width:55%"></div>
      <div class="line" style="width:35%"></div>

    <div class="envelope-flap" id="envelopeFlap"></div>
    <div class="seal" id="seal">❤️</div>
    <div class="envelope-tap-hint" id="tapHint">👆 点一下打开</div>
  </div>

  <div class="letter-paper" id="letterPaper">
    <div class="letter-title">💌 致特别的你</div>
    <div class="letter-text" id="letterText"></div>
    <span class="typewriter-cursor" id="cursor"></span>
    <div class="letter-choices" id="letterChoices">
      <button class="choice-btn choice-yes" id="choiceYes">想我，超级想！💕</button>
      <button class="choice-btn choice-no" id="choiceNo">才不想你呢 😒</button>
    </div>
  </div>

  <div class="btn-row" id="btnRow">
    <button class="btn-forgive" id="btnForgive">原谅我好吗？💕</button>
    <button class="btn-no" id="btnNo">😤 不想原谅</button>

  <div class="thank-you" id="thankYou">陈同学最好了 ❤️</div>
  <div class="achievement-card" id="achievementCard">

</div>

<div class="overlay" id="overlay1">

    <div class="modal-buttons">
      <button class="modal-btn-primary" id="modal1No">😤 就不原谅！</button>
      <button class="modal-btn-secondary" id="modal1Think">🤔 我再想想...</button>
    </div>
  </div>
</div>

<div class="overlay" id="overlay2">
  <div class="modal-card" id="modal2Card">
    <div class="modal-emoji" id="modal2Emoji">🙇</div>
    <div class="modal-title" id="modal2Title">那这样——我用实际行动道歉</div>
    <div class="modal-subtitle" id="modal2Sub"></div>
    <div class="modal-buttons">
      <button class="modal-btn-primary" id="modal2Ok" style="display:none;">说到做到哦 😤💕</button>
    </div>
  </div>
</div>

<div class="path-trigger" id="pathTrigger">·</div>
<div class="path-panel" id="pathPanel">
  <div class="path-title">📊 她的选择路线</div>
  <div class="path-rows" id="pathRows"></div>
  <button class="path-close" id="pathClose">知道了</button>
</div>

<script>
(function(){
// ── Canvas ──
var canvas=document.getElementById('particlesCanvas');
var ctx=canvas.getContext('2d');
var particles=[];
var w,h;
function resize(){w=canvas.width=innerWidth;h=canvas.height=innerHeight}
resize();addEventListener('resize',resize);

function drawHeart(cx,cy,s){
  ctx.beginPath();
  ctx.moveTo(cx,cy+s*.3);
  ctx.bezierCurveTo(cx,cy,cx-s,cy,cx-s,cy+s*.3);
  ctx.bezierCurveTo(cx-s,cy+s*.65,cx,cy+s*.9,cx,cy+s*1.15);
  ctx.bezierCurveTo(cx,cy+s*.9,cx+s,cy+s*.65,cx+s,cy+s*.3);
  ctx.bezierCurveTo(cx+s,cy,cx,cy,cx,cy+s*.3);
  ctx.fill();
}
var heartColors=['rgba(240,130,150,.35)','rgba(240,120,160,.28)','rgba(250,160,180,.32)','rgba(255,180,190,.30)','rgba(245,140,170,.25)','rgba(235,150,140,.30)'];
for(var i=0;i<35;i++)particles.push({type:Math.random()>.3?'heart':'circle',x:Math.random()*w,y:Math.random()*h,size:3+Math.random()*8,speedY:.15+Math.random()*.55,speedX:(Math.random()-.5)*.4,opacity:.18+Math.random()*.3,wobble:Math.random()*Math.PI*2,wobbleSpeed:.005+Math.random()*.02,color:heartColors[Math.floor(Math.random()*heartColors.length)]});
function animParticles(){
  ctx.clearRect(0,0,w,h);
  for(var i=0;i<particles.length;i++){
    var p=particles[i];
    p.y-=p.speedY;p.wobble+=p.wobbleSpeed;p.x+=p.speedX+Math.sin(p.wobble)*.3;
    if(p.y<-20){p.y=h+20;p.x=Math.random()*w}
    if(p.x<-20)p.x=w+20;if(p.x>w+20)p.x=-20;
    ctx.save();ctx.globalAlpha=p.opacity;ctx.fillStyle=p.color;
    if(p.type==='heart')drawHeart(ctx,p.x,p.y,p.size);
    else{ctx.beginPath();ctx.arc(ctx,p.x,p.y,p.size*.5,0,Math.PI*2);ctx.fill()}
    ctx.restore();
  }
  requestAnimationFrame(animParticles);
}
animParticles();

  '我们相识已经二十九天，',
  '从初识，到渐渐暧昧。',
  '我渐渐在意你对我的想法，',
  '所以总是问你想不想我。'
];
var part2=[
  '',
  '和你聊天、相处的每一刻，',
  '我都很珍惜。',
  '时间再慢点吧，',
  '我想在慢下来的世界多了解你一点。',
  '',
  '所以——',

];
var full1=part1.join('\n'),full2=part2.join('\n');

var cursorEl=document.getElementById('cursor');
var charIdx=0,pastBreak=false,feedbackText='',typewriterDone=false;

function typeNextChar(){
  if(!pastBreak){
    if(charIdx<full1.length){
      letterEl.textContent=full1.slice(0,charIdx+1);
      charIdx++;
      var d=full1[charIdx-1]==='\n'?120:80+Math.random()*70;
      setTimeout(typeNextChar,d);
    }else{
      pastBreak=true;cursorEl.style.display='none';
      document.getElementById('letterChoices').classList.add('visible');
    }
  }else if(feedbackText){
    var combined=feedbackText+'\n\n'+full2;
    if(charIdx<combined.length){
      letterEl.textContent=full1+'\n\n'+combined.slice(0,charIdx+1);
      charIdx++;
      var d2=combined[charIdx-1]==='\n'?120:80+Math.random()*70;
      setTimeout(typeNextChar,d2);
    }else{
      typewriterDone=true;cursorEl.style.display='none';
      var br=document.getElementById('btnRow');
      br.style.display='flex';setTimeout(function(){br.classList.add('visible')},50);
    }
  }
}

  document.getElementById('letterChoices').classList.remove('visible');

});

  cursorEl.style.display='inline-block';typeNextChar();
});

// ── Burst & Celebrate ──
function spawnBurst(x,y,n){
  var emojis=['❤️','💕','💖','💗','💝','✨','🌸','💐'];
  for(var i=0;i<n;i++){
    var el=document.createElement('span');
    el.className='burst-heart';
    el.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    el.style.left=x+'px';el.style.top=y+'px';
    el.style.setProperty('--dx',(Math.random()-.5)*350+'px');
    el.style.setProperty('--dy',-(80+Math.random()*250)+'px');
    el.style.setProperty('--rot',(Math.random()-.5)*200+'deg');
    el.style.animationDelay=Math.random()*.35+'s';
    el.style.fontSize=(18+Math.random()*24)+'px';
    document.body.appendChild(el);
    setTimeout(function(){el.remove()},2600);
  }
}
function celebrate(src){
  document.getElementById('btnRow').style.display='none';
  document.getElementById('thankYou').style.display='block';
  var r=src.getBoundingClientRect();
  spawnBurst(r.left+r.width/2,r.top+r.height/2,35);
  for(var i=0;i<20;i++)particles.push({type:'heart',x:r.left+r.width/2,y:r.top+r.height/2,size:4+Math.random()*6,speedY:.8+Math.random()*1.5,speedX:(Math.random()-.5)*1.5,opacity:.4+Math.random()*.4,wobble:Math.random()*Math.PI*2,wobbleSpeed:.01+Math.random()*.04,color:heartColors[Math.floor(Math.random()*heartColors.length)]});
  // Achievement card
  setTimeout(function(){
    var card=document.getElementById('achievementCard');
    var badge=document.getElementById('achievementBadge');
    var p=loadPath();
    if(p&&card){
      var emojiSeq='',name='';
      if(p.choice==='yes'&&p.forgive==='direct'){emojiSeq='💕 ✨ 💕';name='双向奔赴'}
      else if(p.choice==='yes'&&p.forgive==='modal2'){emojiSeq='💕 🛒 😤';name='购物车战神'}
      else if(p.choice==='no'&&p.forgive==='direct'){emojiSeq='😤 💕 ✨';name='嘴硬心软'}
      else if(p.choice==='no'&&p.forgive==='modal2'){emojiSeq='😤 🍜 🛒';name='吃货认证'}
      else{emojiSeq='💌 🌸 ✨';name='神秘彩蛋'}
      badge.innerHTML=emojiSeq+'<div class="achievement-name">'+name+'</div>';
      card.style.display='block';
    }
  },1200);
}

// 🎵 Background Music + Player
// 🎵 Music Player
var bgMusic=document.getElementById("bgMusic");
var musicPlaying=false,pTimer=null,playMode=0;
var playModes=["🔁","🔀","🔂"];

function initAudio(){
  if(!bgMusic.src){bgMusic.src="./music/balalaika.mp3";}
  if(musicPlaying){toggleMusic();return;}
  bgMusic.play().then(function(){
    musicPlaying=true;showBar();updateBar();
    var btn=document.getElementById("musicToggle");
    btn.classList.remove("muted");btn.textContent="🎵";
    startPUpdate();
  })["catch"](function(){});
}
function toggleMusic(){
  if(!bgMusic.src&&!musicPlaying){initAudio();return;}
  var btn=document.getElementById("musicToggle");
  if(musicPlaying){
    bgMusic.pause();btn.classList.add("muted");btn.textContent="🔇";
    document.getElementById("playBtn").textContent="▶";
    if(pTimer){clearInterval(pTimer);pTimer=null;}
  }else{
    bgMusic.play().then(function(){
      btn.classList.remove("muted");btn.textContent="🎵";
      document.getElementById("playBtn").textContent="⏸";
      startPUpdate();
    })["catch"](function(){});
  }
  musicPlaying=!musicPlaying;
}
function showBar(){
  document.getElementById("bar").classList.add("show");
}
function fmt(t){
  if(!t||isNaN(t))return"0:00";
  var m=Math.floor(t/60),s=Math.floor(t%60);
  return m+":"+(s<10?"0":"")+s;
}
function startPUpdate(){
  if(pTimer)clearInterval(pTimer);
  pTimer=setInterval(function(){
    if(!bgMusic.duration)return;
    var p=(bgMusic.currentTime/bgMusic.duration)*100;
    document.getElementById("barFill").style.width=p+"%";
    document.getElementById("tCur").textContent=fmt(bgMusic.currentTime);
    document.getElementById("tTot").textContent=fmt(bgMusic.duration);
  },500);
}
function updateBar(){
  document.getElementById("playBtn").textContent=musicPlaying?"⏸":"▶";
}
// Progress bar click
document.getElementById("barTrack").addEventListener("click",function(e){
  if(!bgMusic.duration)return;
  var r=this.getBoundingClientRect();
  bgMusic.currentTime=((e.clientX-r.left)/r.width)*bgMusic.duration;
});
// Play/pause
document.getElementById("playBtn").addEventListener("click",function(e){
  e.stopPropagation();toggleMusic();
});
// Prev/next (no-op for single song)
document.getElementById("prevBtn").addEventListener("click",function(){
  if(bgMusic.currentTime>3){bgMusic.currentTime=0}else{bgMusic.currentTime=0}
});
document.getElementById("nextBtn").addEventListener("click",function(){
  bgMusic.currentTime=0;
});
// Play mode cycle
document.getElementById("modeBtn").addEventListener("click",function(){
  playMode=(playMode+1)%3;
  this.textContent=playModes[playMode];
  bgMusic.loop=(playMode===2); // single cycle
});
// Volume
document.getElementById("barVs").addEventListener("input",function(){
  bgMusic.volume=parseFloat(this.value);
  var vi=document.getElementById("barVi");
  if(this.value==0)vi.textContent="🔇";
  else if(this.value<0.3)vi.textContent="🔈";
  else if(this.value<0.7)vi.textContent="🔉";
  else vi.textContent="🔊";
});
// Lyrics overlay
document.getElementById("barCover").addEventListener("click",showLyrics);
document.getElementById("barInfo").addEventListener("click",showLyrics);
document.getElementById("lyricBtn").addEventListener("click",showLyrics);
function showLyrics(){
  var c=document.getElementById("barCover").querySelector("img");
  if(c&&c.src){document.getElementById("lyricBg").style.backgroundImage="url("+c.src+")";}
  document.getElementById("lyricOverlay").classList.add("show");
}
document.getElementById("lyricClose").addEventListener("click",function(){
  document.getElementById("lyricOverlay").classList.remove("show");
});
document.getElementById("lyricOverlay").addEventListener("click",function(e){
  if(e.target===this)this.classList.remove("show");
});
// Music toggle button (top-right)
document.getElementById("musicToggle").addEventListener("click",initAudio);
bgMusic.volume=0.6;
})();
